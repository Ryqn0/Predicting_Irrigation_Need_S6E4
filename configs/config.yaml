data:
  raw_path: data/raw/
  processed_path: data/processed/

model:
  name: lightgbm
  params:
    objective:         "multiclass",
    num_class:         3,
    metric:            "multi_logloss",
    n_estimators:      10000,

    # tree structure
    num_leaves:        127,
    max_depth:         -1,
    min_child_samples: 100,    # higher = less overfit on 630k rows

    # stochastic regularization
    eature_fraction:  0.8,
    bagging_fraction:  0.8,
    bagging_freq:      5,

    # L1/L2
    lambda_l1:         0.1,
    lambda_l2:         1.0,

    learning_rate:     0.05,
    n_jobs:            -1,
    seed:              42,
    verbose:           -1,

training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

mlflow:
  train :
    experiment_name: irrigation-need
    tracking_uri: mlruns/
  eval:
    experiment_name: irrigation-need-eval
    tracking_uri: mlruns/
